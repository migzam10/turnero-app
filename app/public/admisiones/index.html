<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admisiones — Turnero</title>
<style>
:root {
    --azul: #1a3a6e; --azul2: #2563eb; --verde: #16a34a;
    --naranja: #d97706; --rojo: #dc2626; --gris: #64748b;
    --fondo: #f1f5f9; --card: #fff; --borde: #e2e8f0; --texto: #1e293b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); color: var(--texto); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.header { background: var(--azul); color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 1.05rem; font-weight: 600; }
.modulo-badge { background: rgba(255,255,255,.2); border-radius: 6px; padding: 3px 10px; font-size: .82rem; font-weight: 700; cursor: pointer; }
.header-right { display: flex; align-items: center; gap: 12px; font-size: .82rem; }
.dot-ws { width: 8px; height: 8px; border-radius: 50%; background: #888; }
.dot-ws.ok { background: #4ade80; }
#reloj { font-weight: 600; }

/* Setup overlay */
.overlay-setup { position: fixed; inset: 0; background: rgba(15,23,42,.7); z-index: 200; display: flex; align-items: center; justify-content: center; }
.setup-card { background: white; border-radius: 14px; padding: 32px; width: 360px; text-align: center; }
.setup-card h2 { color: var(--azul); margin-bottom: 6px; }
.setup-card p { color: var(--gris); font-size: .9rem; margin-bottom: 20px; }
.setup-select { width: 100%; padding: 10px 14px; border: 2px solid var(--borde); border-radius: 8px; font-size: 1rem; font-family: inherit; margin-bottom: 16px; }
.btn-setup { width: 100%; background: var(--azul); color: white; border: none; border-radius: 8px; padding: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; }
.btn-setup:hover { background: #152e57; }

/* Layout */
.layout { flex: 1; display: flex; overflow: hidden; }

/* Lista de espera */
.panel-cola { flex: 1; padding: 16px 24px; overflow-y: auto; width: 100%; }
.panel-titulo { font-weight: 700; color: var(--azul); font-size: .95rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.count-badge { background: var(--azul); color: white; font-size: .7rem; padding: 2px 7px; border-radius: 99px; font-weight: 700; }
/* Sección informativa "Admisionados hoy": título más discreto y badge gris. */
.panel-titulo.panel-titulo-admis { margin-top: 24px; color: var(--gris); }
.count-badge.count-badge-gris { background: var(--gris); }

.pac-card { background: var(--card); border-radius: 12px; border: 1.5px solid var(--borde); padding: 18px 20px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 14px; transition: all .2s; }
.pac-card:hover { border-color: #93c5fd; box-shadow: 0 2px 8px rgba(37,99,235,.08); }
.pac-card.activo { border-color: var(--naranja); background: #fffbeb; }

.pac-top { display: flex; align-items: center; gap: 14px; }
.pri-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
.pri-normal { background: #94a3b8; }
.pri-media { background: var(--naranja); }
.pri-alta { background: var(--rojo); }

.pac-info { flex: 1; min-width: 0; }
.pac-nombre { font-weight: 700; font-size: 1.05rem; }
.pac-sub { font-size: .85rem; color: var(--gris); margin-top: 3px; }

.pac-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-sm { padding: 9px 18px; border-radius: 8px; border: none; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .2s; }
.btn-sm:disabled { opacity: .45; cursor: not-allowed; }
.btn-sm:disabled:hover { background: var(--azul); }
.btn-ver { background: #eff6ff; color: var(--azul2); border: 1px solid #bfdbfe; }
.btn-ver:hover { background: #dbeafe; }
.btn-llamar { background: var(--azul); color: white; }
.btn-llamar:hover { background: #152e57; }

.btn-sm.btn-admisionar { background: var(--verde); color: white; }
.btn-sm.btn-admisionar:hover { background: #15803d; }
.btn-sm.btn-devolver { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
.btn-sm.btn-devolver:hover { background: #fef08a; }
.btn-sm.btn-sonar { background: #ede9fe; color: #5b21b6; border: 1px solid #c4b5fd; }
.btn-sm.btn-sonar:hover { background: #ddd6fe; }
.btn-sm.btn-asignar { background: #e0e7ff; color: #3730a3; border: 1px solid #a5b4fc; }
.btn-sm.btn-asignar:hover { background: #c7d2fe; }

/* Formulario "Asignar a profesional" (autocompletar con texto libre) */
.asig-grupo { margin-bottom: 12px; position: relative; }
.asig-label { font-size: .72rem; font-weight: 600; color: var(--gris); text-transform: uppercase; display: block; margin-bottom: 5px; }
.asig-input { width: 100%; padding: 9px 12px; border: 2px solid var(--borde); border-radius: 8px; font-size: .95rem; font-family: inherit; }
.asig-input:focus { outline: none; border-color: var(--azul2); }
.asig-sugerencias { list-style: none; border: 1.5px solid var(--borde); border-radius: 8px; max-height: 160px; overflow-y: auto; background: white; display: none; position: absolute; left: 0; right: 0; z-index: 5; }
.asig-sugerencias.visible { display: block; }
.asig-sugerencias li { padding: 8px 12px; cursor: pointer; font-size: .9rem; }
.asig-sugerencias li:hover { background: #eff6ff; }

.vacia { text-align: center; padding: 50px 16px; color: var(--gris); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 300; display: none; align-items: center; justify-content: center; }
.modal-overlay.visible { display: flex; }
.modal { background: white; border-radius: 14px; padding: 24px; width: 440px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
.modal-titulo { font-size: 1.1rem; font-weight: 700; color: var(--azul); margin-bottom: 16px; }
.datos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.dato-item { background: #f8fafc; border-radius: 8px; padding: 8px 10px; }
.dato-label { font-size: .68rem; font-weight: 600; color: var(--gris); text-transform: uppercase; }
.dato-val { font-size: .9rem; font-weight: 600; margin-top: 2px; }
.dato-item.full { grid-column: 1/-1; }
.modal-footer { display: flex; gap: 8px; margin-top: 12px; }
.btn-outline { flex: 1; padding: 9px; border-radius: 8px; border: 2px solid var(--borde); background: white; cursor: pointer; font-size: .85rem; color: var(--gris); }
.btn-outline:hover { border-color: var(--rojo); color: var(--rojo); }

/* Prioridad selector en modal */
.prioridad-row { display: flex; gap: 8px; margin-top: 10px; }
.prioridad-btn { flex: 1; padding: 7px; border-radius: 7px; border: 2px solid var(--borde); background: white; cursor: pointer; font-size: .78rem; font-weight: 600; }
.prioridad-btn[data-val="normal"].activo { border-color: var(--verde); background: #dcfce7; color: var(--verde); }
.prioridad-btn[data-val="media"].activo { border-color: var(--naranja); background: #fef3c7; color: var(--naranja); }
.prioridad-btn[data-val="alta"].activo { border-color: var(--rojo); background: #fee2e2; color: var(--rojo); }

/* Tarjeta de otro módulo (solo lectura) + badge */
.pac-card.atenuado { opacity: .6; }
.badge-otro { background: #fef3c7; color: #92400e; font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin-left: 6px; }

/* Búsqueda en el título de la cola */
.cola-buscar { margin-left: auto; border: 1.5px solid var(--borde); border-radius: 7px; padding: 6px 10px; font-size: .82rem; font-family: inherit; font-weight: 400; width: 220px; }
.cola-buscar:focus { outline: none; border-color: var(--azul2); }

/* Banner de reconexión (franja bajo el header) */
.banner-reconexion { background: #f59e0b; color: #1e293b; font-weight: 700; text-align: center; padding: 8px 16px; font-size: .85rem; flex-shrink: 0; }

/* Toasts (abajo a la derecha, apilables) */
#toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 500; display: flex; flex-direction: column; gap: 10px; }
.toast { min-width: 240px; max-width: 360px; padding: 12px 16px; border-radius: 10px; font-size: .9rem; font-weight: 600; box-shadow: 0 4px 14px rgba(0,0,0,.15); animation: toastIn .25s ease; }
.toast.error { background: #fee2e2; color: var(--rojo); border: 1.5px solid #fca5a5; }
.toast.ok { background: #dcfce7; color: var(--verde); border: 1.5px solid #86efac; }
@keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body data-modulo="Admisiones">

<!-- Setup overlay -->
<div class="overlay-setup" id="overlay-setup">
    <div class="setup-card">
        <h2>Módulo de Admisiones</h2>
        <p>Seleccione el módulo asignado a esta terminal para comenzar</p>
        <select class="setup-select" id="select-modulo">
            <option value="">Cargando módulos...</option>
        </select>
        <button class="btn-setup" onclick="confirmarModulo()">Confirmar y entrar</button>
    </div>
</div>

<div class="header">
    <div class="header-left">
        <h1 data-titulo-base="Admisiones">Admisiones — Turnero</h1>
        <span class="modulo-badge" id="modulo-badge" onclick="cambiarModulo()" title="Clic para cambiar módulo">—</span>
    </div>
    <div class="header-right">
        <span id="reloj">--:--</span>
        <div class="dot-ws" id="dot-ws"></div>
        <button onclick="salir()" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:7px;padding:6px 12px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit">Salir</button>
    </div>
</div>

<!-- Banner de reconexión: visible solo mientras el socket está caído -->
<div class="banner-reconexion" id="banner-reconexion" style="display:none">⚠ Sin conexión en tiempo real — reconectando…</div>

<div class="layout">
    <!-- Cola de espera -->
    <div class="panel-cola">
        <div class="panel-titulo">
            Cola de espera
            <span class="count-badge" id="count-espera">0</span>
            <input type="text" class="cola-buscar" id="cola-buscar" placeholder="Buscar nombre o cédula…" oninput="filtrarCola(this.value)">
        </div>
        <div id="lista-espera"></div>
    </div>
</div>

<!-- Modal datos paciente -->
<div class="modal-overlay" id="modal-paciente">
    <div class="modal">
        <div class="modal-titulo" id="modal-pac-nombre">—</div>
        <div class="datos-grid" id="modal-datos-grid"></div>
        <div>
            <div style="font-size:.75rem;font-weight:600;color:var(--gris);text-transform:uppercase;margin-bottom:6px">Prioridad</div>
            <div class="prioridad-row" id="modal-pri-row"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-sm btn-llamar" style="flex:1;padding:9px;" onclick="llamarDesdeModal()">Llamar</button>
            <button class="btn-outline" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>
</div>

<!-- Modal asignar a profesional (paciente particular, no va a Biofile) -->
<div class="modal-overlay" id="modal-asignar">
    <div class="modal">
        <div class="modal-titulo">Asignar a profesional</div>
        <div class="dato-item full" style="margin-bottom:14px">
            <div class="dato-label">Paciente</div>
            <div class="dato-val" id="asig-pac-nombre">—</div>
        </div>
        <div class="asig-grupo">
            <label class="asig-label">Profesional *</label>
            <input class="asig-input" id="asig-input-prof" placeholder="Escriba el nombre del profesional" autocomplete="off"
                   oninput="buscarProfesionalAsig(this.value)"
                   onblur="setTimeout(()=>document.getElementById('asig-sugerencias').classList.remove('visible'),200)">
            <ul class="asig-sugerencias" id="asig-sugerencias"></ul>
        </div>
        <div class="asig-grupo">
            <label class="asig-label">Área / Servicio (opcional)</label>
            <input class="asig-input" id="asig-input-area" placeholder="Por defecto: PARTICULAR" maxlength="60">
        </div>
        <div class="modal-footer">
            <button class="btn-sm btn-admisionar" style="flex:1;padding:9px" id="asig-btn-enviar" onclick="enviarAsignacion()">Asignar</button>
            <button class="btn-outline" onclick="cerrarAsignar()">Cancelar</button>
        </div>
    </div>
</div>

<!-- Contenedor de toasts -->
<div id="toast-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/branding.js"></script>
<script>
const TERMINAL_ID = (() => {
    const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
    let id = localStorage.getItem('terminal_id');
    if (!id || !UUID_RE.test(id)) {
        id = crypto.randomUUID
            ? crypto.randomUUID()
            : ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
                (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
        localStorage.setItem('terminal_id', id);
    }
    return id;
})();

let moduloActual = localStorage.getItem('modulo_admisiones') || '';
let pacienteModalData = null;
let colaActual = [];

// Escapa texto dinámico antes de interpolarlo en un template que va a innerHTML.
function esc(v) {
    return String(v ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
// Bloqueo de concurrencia: true mientras hay un "Llamar" en vuelo, para que el
// operador no pueda lanzar dos llamados simultáneos antes de la respuesta.
let llamadoEnCurso = false;
// Asignación manual a profesional: id del paciente en curso, caché del catálogo de
// nombres y flag anti doble-submit.
let asigPacienteId = null;
let catalogoProfesionales = null; // null = aún no cargado
let asignacionEnCurso = false;
// Filtro de búsqueda de la cola (nombre o cédula), aplicado client-side al render.
let filtroCola = '';

// Mini sistema de toasts (abajo a la derecha, apilables, auto-cierre a los 4s).
function showToast(mensaje, tipo = 'error') {
    const cont = document.getElementById('toast-container');
    if (!cont) return;
    const el = document.createElement('div');
    el.className = `toast ${tipo === 'ok' ? 'ok' : 'error'}`;
    el.textContent = mensaje;
    cont.appendChild(el);
    setTimeout(() => el.remove(), 4000);
}

// ── Reloj ───────────────────────────────────────────────────────
function actualizarReloj() {
    document.getElementById('reloj').textContent = new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(actualizarReloj, 1000);
actualizarReloj();

// ── Socket ──────────────────────────────────────────────────────
const socket = io();
socket.on('connect', () => {
    document.getElementById('dot-ws').classList.add('ok');
    document.getElementById('banner-reconexion').style.display = 'none';
    socket.emit('join', { tipo: 'admisiones', terminalId: TERMINAL_ID });
    cargarCola();
});
socket.on('disconnect', () => {
    document.getElementById('dot-ws').classList.remove('ok');
    document.getElementById('banner-reconexion').style.display = '';
});
socket.on('paciente:nuevo', () => cargarCola());
socket.on('paciente:prioridad', () => cargarCola());
socket.on('paciente:eliminado', () => cargarCola());
socket.on('admision:llamando', () => cargarCola());
socket.on('admision:completada',() => cargarCola());
socket.on('admision:devuelto', () => cargarCola());
socket.on('asignacion:manual', () => cargarCola());
socket.on('config:actualizada', () => window.recargarBranding && window.recargarBranding());

// ── Setup módulo ────────────────────────────────────────────────
async function cargarModulos() {
    try {
        const resp = await fetch('/api/admisiones/config-modulos');
        const modulos = await resp.json();
        const sel = document.getElementById('select-modulo');
        sel.innerHTML = modulos.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('');
        if (moduloActual) sel.value = moduloActual;
    } catch {
        document.getElementById('select-modulo').innerHTML = '<option value="Módulo 1">Módulo 1</option><option value="Módulo 2">Módulo 2</option><option value="Módulo 3">Módulo 3</option>';
    }
}

function confirmarModulo() {
    const sel = document.getElementById('select-modulo').value;
    if (!sel) return;
    moduloActual = sel;
    localStorage.setItem('modulo_admisiones', moduloActual);
    document.getElementById('modulo-badge').textContent = moduloActual;
    document.getElementById('overlay-setup').style.display = 'none';
    cargarCola();
}

function cambiarModulo() {
    cargarModulos();
    document.getElementById('overlay-setup').style.display = 'flex';
}

// Botón "Salir": limpia el módulo seleccionado y vuelve al menú principal.
function salir() {
    localStorage.removeItem('modulo_admisiones');
    window.location.href = '/';
}

// ── Cola ────────────────────────────────────────────────────────
async function cargarCola() {
    if (!moduloActual) return;
    try {
        const resp = await fetch('/api/admisiones/cola', { headers: { 'X-Terminal-Id': TERMINAL_ID } });
        colaActual = await resp.json();
        renderCola();
    } catch {}
}

// ¿El paciente está en proceso por OTRO módulo (solo lectura en esta terminal)?
function esOtroModulo(p) {
    return (p.estado_admision === 'llamando_admision' || p.estado_admision === 'admisionando')
        && p.modulo_admision !== moduloActual;
}

// "· espera X min" desde hora_llegada, con color según umbral (naranja ≥30, rojo ≥60).
function esperaHtml(p) {
    if (!p.hora_llegada) return '';
    const mins = Math.floor((Date.now() - new Date(p.hora_llegada)) / 60000);
    if (mins < 0) return '';
    let estilo = '';
    if (mins >= 60) estilo = 'color:var(--rojo);font-weight:700';
    else if (mins >= 30) estilo = 'color:var(--naranja);font-weight:700';
    return ` · <span style="${estilo}">espera ${mins} min</span>`;
}

function renderCola() {
    // La cola muestra: los pacientes en espera, los que ESTE módulo tiene en proceso, y
    // —solo lectura— los que otros módulos están procesando (tarjeta atenuada).
    const visibles = colaActual.filter(p =>
        p.estado_admision === 'esperando' ||
        ((p.estado_admision === 'llamando_admision' || p.estado_admision === 'admisionando') && p.modulo_admision === moduloActual) ||
        esOtroModulo(p)
    );
    const espera = visibles.filter(p => p.estado_admision === 'esperando');
    // "En proceso" (para el bloqueo) considera SOLO el módulo propio: lo que hagan otros
    // módulos no debe impedir que esta terminal llame a un paciente.
    const enProceso = visibles.filter(p =>
        (p.estado_admision === 'llamando_admision' || p.estado_admision === 'admisionando') && p.modulo_admision === moduloActual);

    // El contador sigue mostrando solo 'esperando'.
    document.getElementById('count-espera').textContent = espera.length;

    // Bloqueo de concurrencia: si este módulo ya tiene un paciente en proceso
    // (o hay un llamado en vuelo), se inhabilita "Llamar" hasta que ese paciente
    // pase a "Admisionado" o "Cancelado".
    const bloquearLlamar = enProceso.length > 0 || llamadoEnCurso;

    const listaEl = document.getElementById('lista-espera');

    // Admisionados del día (sección informativa, solo lectura), más reciente primero.
    const admisionados = colaActual
        .filter(p => p.estado_admision === 'admisionado')
        .sort((a, b) => new Date(b.hora_admision || 0) - new Date(a.hora_admision || 0));

    // Filtro client-side por nombre o cédula. Se aplica por igual a la cola y a los
    // admisionados (útil para responder "¿ya se admisionó fulano?").
    const q = filtroCola.trim().toLowerCase();
    const coincide = p =>
        (p.nombre_completo || '').toLowerCase().includes(q) ||
        String(p.numero_identificacion || '').toLowerCase().includes(q);
    const mostrados = q ? visibles.filter(coincide) : visibles;
    const admisionadosMostrados = q ? admisionados.filter(coincide) : admisionados;

    // Nada que mostrar: ni cola ni admisionados del día.
    if (!visibles.length && !admisionados.length) {
        listaEl.innerHTML = '<div class="vacia">No hay pacientes en espera</div>';
        return;
    }
    // Búsqueda sin coincidencias en ninguna de las dos listas.
    if (q && !mostrados.length && !admisionadosMostrados.length) {
        listaEl.innerHTML = '<div class="vacia">Sin coincidencias</div>';
        return;
    }

    // Parte superior: cola en proceso/espera. Si no hay (o no coinciden) pero sí hay
    // admisionados, un aviso compacto encabeza la sección informativa de abajo.
    const htmlCola = mostrados.length ? mostrados.map(p => {
        const otro = esOtroModulo(p);
        const llamando = p.estado_admision === 'llamando_admision' && !otro;
        const admisionando = p.estado_admision === 'admisionando' && !otro;
        const activo = llamando || admisionando; // marca de tarjeta para ambas etapas en proceso
        const hora = p.hora_llegada ? new Date(p.hora_llegada).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }) : '';

        // Flujo de dos pasos (módulo propio): al "Llamar" la fila no se mueve, solo cambian
        // sus controles. Otro módulo → tarjeta atenuada con badge y solo "Ver datos".
        const btnAsignar = `<button class="btn-sm btn-asignar" onclick="abrirAsignar('${p.id}')">Asignar a profesional</button>`;
        let botones;
        if (otro) {
            botones = `<button class="btn-sm btn-ver" onclick="verPaciente('${p.id}')">Ver datos</button>`;
        } else if (admisionando) {
            botones = `<button class="btn-sm btn-ver" onclick="verPaciente('${p.id}')">Ver datos</button>
               <button class="btn-sm btn-admisionar" onclick="finalizarPaciente('${p.id}')">Finalizar</button>
               ${btnAsignar}`;
        } else if (llamando) {
            botones = `<button class="btn-sm btn-ver" onclick="verPaciente('${p.id}')">Ver datos</button>
               <button class="btn-sm btn-sonar" onclick="sonarPaciente('${p.id}')" title="Volver a sonar la alerta en el display">Sonar</button>
               <button class="btn-sm btn-admisionar" onclick="admisionandoPaciente('${p.id}')">Admisionando</button>
               <button class="btn-sm btn-devolver" onclick="devolverPaciente('${p.id}')">Cancelar</button>
               ${btnAsignar}`;
        } else {
            botones = `<button class="btn-sm btn-ver" onclick="verPaciente('${p.id}')">Ver datos</button>
               <button class="btn-sm btn-llamar" onclick="llamarPaciente('${p.id}')" ${bloquearLlamar ? 'disabled' : ''}>Llamar</button>
               ${btnAsignar}`;
        }

        // Línea secundaria: cédula · hora, más el badge "En {módulo}" (otro) o la espera.
        let subExtra = '';
        if (otro) subExtra = `<span class="badge-otro">En ${esc(p.modulo_admision || 'otro módulo')}</span>`;
        else if (p.estado_admision === 'esperando') subExtra = esperaHtml(p);

        return `<div class="pac-card${activo ? ' activo' : ''}${otro ? ' atenuado' : ''}">
            <div class="pac-top">
                <div class="pri-dot pri-${esc(p.prioridad)}"></div>
                <div class="pac-info">
                    <div class="pac-nombre">${esc(p.nombre_completo)}</div>
                    <div class="pac-sub">${esc(p.numero_identificacion)} · ${hora}${subExtra}</div>
                </div>
            </div>
            <div class="pac-btns">${botones}</div>
        </div>`;
    }).join('') : '<div class="vacia" style="padding:24px 16px">No hay pacientes en espera</div>';

    // Parte inferior: "Admisionados hoy" (informativo). Tarjeta atenuada, sin botones,
    // con el módulo que lo admisionó y sus horas de llegada/admisión.
    let htmlAdmis = '';
    if (admisionadosMostrados.length) {
        htmlAdmis = `<div class="panel-titulo panel-titulo-admis">Admisionados hoy <span class="count-badge count-badge-gris">${admisionadosMostrados.length}</span></div>`
            + admisionadosMostrados.map(p => {
                const horaLlegada = p.hora_llegada ? new Date(p.hora_llegada).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }) : '';
                const horaAdmision = p.hora_admision ? new Date(p.hora_admision).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }) : '';
                const sub = [esc(p.numero_identificacion), horaLlegada && `Llegó ${horaLlegada}`, horaAdmision && `Admisionado ${horaAdmision}`].filter(Boolean).join(' · ');
                return `<div class="pac-card atenuado">
                    <div class="pac-top">
                        <div class="pri-dot pri-${esc(p.prioridad)}"></div>
                        <div class="pac-info">
                            <div class="pac-nombre">${esc(p.nombre_completo)}<span class="badge-otro">${esc(p.modulo_admision || '—')}</span></div>
                            <div class="pac-sub">${sub}</div>
                        </div>
                    </div>
                </div>`;
            }).join('');
    }

    listaEl.innerHTML = htmlCola + htmlAdmis;
}

// Filtro de búsqueda: actualiza el texto y re-renderiza (no afecta el contador total).
function filtrarCola(texto) {
    filtroCola = texto || '';
    renderCola();
}

// Re-render periódico para refrescar el "espera X min" mientras haya pacientes esperando.
setInterval(() => {
    if (colaActual.some(p => p.estado_admision === 'esperando')) renderCola();
}, 60000);

// Reenvía la alerta de audio/display del paciente ya llamado por este módulo.
function sonarPaciente(id) {
    const p = colaActual.find(x => x.id === id);
    if (!p) return;
    socket.emit('admision:sonar', p);
}

// ── Acciones ────────────────────────────────────────────────────
// ¿Este módulo ya tiene un paciente en proceso (llamado y aún sin admisionar/cancelar)?
function moduloOcupado() {
    return colaActual.some(p => (p.estado_admision === 'llamando_admision' || p.estado_admision === 'admisionando') && p.modulo_admision === moduloActual);
}

async function llamarPaciente(id) {
    // No permitir dos llamados simultáneos ni un nuevo llamado con el módulo ocupado.
    if (llamadoEnCurso || moduloOcupado()) return;
    llamadoEnCurso = true;
    // Deshabilitación inmediata de todos los botones "Llamar" (sin esperar al servidor).
    document.querySelectorAll('.btn-llamar').forEach(b => { b.disabled = true; });

    try {
        const resp = await fetch(`/api/admisiones/llamar/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Terminal-Id': TERMINAL_ID },
            body: JSON.stringify({ modulo: moduloActual })
        });
        if (!resp.ok) { const d = await resp.json(); showToast(d.error === 'estado_invalido' ? 'El paciente ya fue llamado' : (d.error || 'No se pudo llamar al paciente'), 'error'); }
    } catch {
        showToast('Error de conexión con el servidor', 'error');
    } finally {
        // El re-render por estado mantiene el bloqueo si el paciente quedó "en proceso";
        // si el llamado falló, los botones se rehabilitan al no haber paciente en proceso.
        llamadoEnCurso = false;
        cargarCola();
    }
}

// Paso 1 del flujo de dos etapas: el paciente pasa de "llamando_admision" a
// "admisionando". El backend emite admision:completada (lo saca del display).
async function admisionandoPaciente(id) {
    try {
        const resp = await fetch(`/api/admisiones/admisionando/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Terminal-Id': TERMINAL_ID }
        });
        if (resp.ok) { cerrarModal(); cargarCola(); return; }
        const d = await resp.json().catch(() => ({}));
        showToast(d.error === 'estado_invalido' ? 'El estado del paciente cambió; se actualizará la lista.' : (d.error || 'No se pudo iniciar la admisión'), 'error');
        cargarCola();
    } catch {
        showToast('Error de conexión con el servidor', 'error');
    }
}

// Paso 2 del flujo: cierra el trámite del paciente que está "admisionando".
async function finalizarPaciente(id) {
    try {
        const resp = await fetch(`/api/admisiones/finalizar/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Terminal-Id': TERMINAL_ID }
        });
        if (resp.ok) { cerrarModal(); cargarCola(); return; }
        const d = await resp.json().catch(() => ({}));
        showToast(d.error === 'estado_invalido' ? 'El estado del paciente cambió; se actualizará la lista.' : (d.error || 'No se pudo finalizar la admisión'), 'error');
        cargarCola();
    } catch {
        showToast('Error de conexión con el servidor', 'error');
    }
}

async function devolverPaciente(id) {
    try {
        const resp = await fetch(`/api/admisiones/devolver/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Terminal-Id': TERMINAL_ID }
        });
        if (resp.ok) { cerrarModal(); cargarCola(); }
    } catch {}
}

// ── Modal ───────────────────────────────────────────────────────
async function verPaciente(id) {
    const p = colaActual.find(x => x.id === id);
    if (!p) return;
    pacienteModalData = p;

    document.getElementById('modal-pac-nombre').textContent = p.nombre_completo;

    const fechaNac = p.fecha_nacimiento ? new Date(p.fecha_nacimiento + 'T12:00:00').toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' }) : '—';
    const horaLlegada = p.hora_llegada ? new Date(p.hora_llegada).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }) : '—';

    document.getElementById('modal-datos-grid').innerHTML = `
        <div class="dato-item"><div class="dato-label">Cédula</div><div class="dato-val">${esc(p.numero_identificacion)}</div></div>
        <div class="dato-item"><div class="dato-label">Tipo</div><div class="dato-val">${esc(p.tipo_identificacion || 'CC')}</div></div>
        <div class="dato-item full"><div class="dato-label">Nombre completo</div><div class="dato-val">${esc(p.nombre_completo)}</div></div>
        <div class="dato-item"><div class="dato-label">Fecha nacimiento</div><div class="dato-val">${fechaNac}</div></div>
        <div class="dato-item"><div class="dato-label">Ciudad expedición</div><div class="dato-val">${esc(p.ciudad_expedicion || '—')}</div></div>
        <div class="dato-item"><div class="dato-label">Hora llegada</div><div class="dato-val">${horaLlegada}</div></div>
        <div class="dato-item"><div class="dato-label">Estado</div><div class="dato-val">${esc(p.estado_admision)}</div></div>
    `;

    // Prioridad
    const priRow = document.getElementById('modal-pri-row');
    priRow.innerHTML = ['normal','media','alta'].map(v =>
        `<button class="prioridad-btn${p.prioridad===v?' activo':''}" data-val="${v}" onclick="cambiarPrioridadModal('${p.id}','${v}')">${v==='alta'?'':v==='media'?'':''}${v.charAt(0).toUpperCase()+v.slice(1)}</button>`
    ).join('');

    document.getElementById('modal-paciente').classList.add('visible');
}

async function llamarDesdeModal() {
    if (!pacienteModalData) return;
    await llamarPaciente(pacienteModalData.id);
    cerrarModal();
}

async function cambiarPrioridadModal(id, pri) {
    try {
        await fetch(`/api/recepcion/${id}/prioridad`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'X-Terminal-Id': TERMINAL_ID },
            body: JSON.stringify({ prioridad: pri })
        });
        // Actualizar estado local
        if (pacienteModalData) pacienteModalData.prioridad = pri;
        document.querySelectorAll('#modal-pri-row .prioridad-btn').forEach(b => {
            b.classList.toggle('activo', b.dataset.val === pri);
        });
        cargarCola();
    } catch {}
}

function cerrarModal() {
    document.getElementById('modal-paciente').classList.remove('visible');
    pacienteModalData = null;
}
document.getElementById('modal-paciente').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
});

// ── Asignar a profesional (manual / particular) ─────────────────
// Carga una sola vez el catálogo de profesionales y lo cachea en memoria. Si falla
// o viene vacío, deja la caché en [] para que el autocompletar no bloquee el texto libre.
async function cargarCatalogo() {
    if (catalogoProfesionales !== null) return; // ya cargado (aunque sea [])
    try {
        const resp = await fetch('/api/profesional/catalogo');
        const data = await resp.json();
        catalogoProfesionales = Array.isArray(data) ? data : [];
    } catch {
        catalogoProfesionales = [];
    }
}

function abrirAsignar(id) {
    asigPacienteId = id;
    const p = colaActual.find(x => x.id === id);
    document.getElementById('asig-pac-nombre').textContent = p ? p.nombre_completo : '—';
    // Limpia el formulario para que no arrastre datos de una asignación previa.
    document.getElementById('asig-input-prof').value = '';
    document.getElementById('asig-input-area').value = '';
    document.getElementById('asig-sugerencias').classList.remove('visible');
    document.getElementById('asig-btn-enviar').disabled = false;
    document.getElementById('modal-asignar').classList.add('visible');
    cargarCatalogo(); // dispara la carga/caché del catálogo en segundo plano
}

// Filtra el catálogo cacheado. El valor final del input puede ser texto libre: estas
// sugerencias solo ayudan a completar, nunca restringen lo que se puede escribir.
function buscarProfesionalAsig(texto) {
    const lista = document.getElementById('asig-sugerencias');
    const q = texto.trim().toUpperCase();
    if (q.length < 1 || !catalogoProfesionales || !catalogoProfesionales.length) {
        lista.classList.remove('visible');
        return;
    }
    const filtrados = catalogoProfesionales.filter(n => n.toUpperCase().includes(q));
    if (filtrados.length) {
        // El nombre va como data-nombre (escapado); un listener delegado lo lee del
        // dataset, así apóstrofes/HTML en el nombre no rompen el handler ni inyectan.
        lista.innerHTML = filtrados.map(n => `<li data-nombre="${esc(n)}">${esc(n)}</li>`).join('');
        lista.classList.add('visible');
    } else {
        lista.classList.remove('visible');
    }
}

// Delegación: un solo listener en el <ul> resuelve el <li> pulsado por su data-nombre.
document.getElementById('asig-sugerencias').addEventListener('click', (e) => {
    const li = e.target.closest('li[data-nombre]');
    if (li) seleccionarProfAsig(li.dataset.nombre);
});

function seleccionarProfAsig(nombre) {
    document.getElementById('asig-input-prof').value = nombre;
    document.getElementById('asig-sugerencias').classList.remove('visible');
}

// Lee el formulario y delega en asignarProfesional con los valores actuales.
function enviarAsignacion() {
    asignarProfesional(
        asigPacienteId,
        document.getElementById('asig-input-prof').value,
        document.getElementById('asig-input-area').value
    );
}

async function asignarProfesional(pacienteId, nombre, area) {
    const prof = (nombre || '').trim().toUpperCase();
    if (!prof) { showToast('Ingrese el nombre del profesional.', 'error'); return; }
    if (asignacionEnCurso) return; // evita doble submit

    // Si el catálogo está cargado y el nombre no coincide con ninguno, pedir confirmación
    // (posible error de escritura). Cancelar aborta sin deshabilitar el botón.
    if (Array.isArray(catalogoProfesionales) && catalogoProfesionales.length &&
        !catalogoProfesionales.some(n => String(n).toUpperCase() === prof)) {
        if (!confirm(`"${prof}" no aparece en el histórico de profesionales. Verifique la escritura. ¿Asignar de todas formas?`)) return;
    }

    asignacionEnCurso = true;
    const btn = document.getElementById('asig-btn-enviar');
    btn.disabled = true;
    try {
        const resp = await fetch(`/api/admisiones/asignar-profesional/${pacienteId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Terminal-Id': TERMINAL_ID },
            body: JSON.stringify({ nombre_profesional: prof, area: (area || '').trim() })
        });
        if (resp.ok) {
            cerrarAsignar();
            cargarCola();
            return;
        }
        if (resp.status === 409) {
            showToast('El paciente ya está asignado a ese profesional.', 'error');
        } else if (resp.status === 404) {
            showToast('Paciente no encontrado o de otra fecha.', 'error');
        } else {
            showToast('No se pudo asignar el profesional. Intente de nuevo.', 'error');
        }
    } catch {
        showToast('Error de conexión con el servidor.', 'error');
    } finally {
        asignacionEnCurso = false;
        // Si el modal sigue abierto (hubo error), rehabilita el botón para reintentar.
        if (document.getElementById('modal-asignar').classList.contains('visible')) {
            btn.disabled = false;
        }
    }
}

function cerrarAsignar() {
    document.getElementById('modal-asignar').classList.remove('visible');
    asigPacienteId = null;
}
document.getElementById('modal-asignar').addEventListener('click', function(e) {
    if (e.target === this) cerrarAsignar();
});

// ── Init ────────────────────────────────────────────────────────
cargarModulos();
if (moduloActual) {
    document.getElementById('modulo-badge').textContent = moduloActual;
    document.getElementById('overlay-setup').style.display = 'none';
} else {
    cargarModulos();
}
</script>
</body>
