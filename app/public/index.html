<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turnero</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.logo { font-size: 2rem; font-weight: 900; color: #1a3a6e; margin-bottom: 6px; }
.sub { color: #64748b; font-size: .95rem; margin-bottom: 40px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; width: 100%; max-width: 900px; }
.card { background: white; border-radius: 14px; padding: 28px 20px; text-align: center; text-decoration: none; color: inherit; border: 2px solid #e2e8f0; transition: all .2s; cursor: pointer; }
.card:hover { border-color: #2563eb; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,.12); }
.card-icon { margin-bottom: 12px; color: #64748b; display: flex; align-items: center; justify-content: center; }
.card-icon svg { width: 40px; height: 40px; }
.card-name { font-weight: 800; font-size: 1.05rem; color: #1a3a6e; }
.card-desc { font-size: .8rem; color: #64748b; margin-top: 5px; line-height: 1.4; }
.footer { margin-top: 40px; font-size: .75rem; color: #94a3b8; }
</style>
</head>
<body>
<div class="logo" data-titulo-base="">Turnero</div>
<div class="grid">
    <a class="card" href="/recepcion">
        <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="18" height="14" rx="2"/>
                <circle cx="8" cy="11" r="2"/>
                <path d="M13 10h5"/><path d="M13 13h5"/><path d="M6 16h7"/>
            </svg>
        </div>
        <div class="card-name">Recepción</div>
        <div class="card-desc">Escaneo y registro de pacientes al llegar</div>
    </a>
    <a class="card" href="/admisiones">
        <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="4" width="14" height="17" rx="2"/>
                <path d="M9 4h6v2a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1z"/>
                <path d="M9 11h6"/><path d="M9 14h6"/><path d="M9 17h4"/>
            </svg>
        </div>
        <div class="card-name">Admisiones</div>
        <div class="card-desc">Llamado y registro en Biofile</div>
    </a>
    <a class="card" href="/profesional">
        <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="8" r="3.5"/>
                <path d="M3.5 20a5.5 5.5 0 0 1 11 0"/>
                <path d="M15.5 13.5l2 2 4-4"/>
            </svg>
        </div>
        <div class="card-name">Profesional</div>
        <div class="card-desc">Lista de pacientes asignados para hoy</div>
    </a>
    <a class="card" href="/display">
        <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="12" rx="2"/>
                <path d="M8 20h8"/><path d="M12 16v4"/>
            </svg>
        </div>
        <div class="card-name">Pantalla TV</div>
        <div class="card-desc">Display público de llamados en tiempo real</div>
    </a>
    <a class="card" href="/admin">
        <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </div>
        <div class="card-name">Administración</div>
        <div class="card-desc">Dashboard, reportes y configuración</div>
    </a>
</div>
<script src="/branding.js"></script>
</body>
</html>
