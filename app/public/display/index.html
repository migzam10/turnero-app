<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pantalla TV — Turnero CertiMedic</title>
<style>
:root {
    --fondo: #eef2f7;
    --card: #ffffff;
    --card2: #f4f7fc;
    --azul: #1e40af;
    --azul-lt: #dbeafe;
    --verde: #16a34a;
    --naranja: #d97706;
    --borde: #dde3ed;
    --texto: #0f172a;
    --texto2: #475569;
    --header: #1e3a6e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); color: var(--texto); display: flex; flex-direction: column; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid rgba(0,0,0,.1); background: var(--header); flex-shrink: 0; }
.logo { font-size: 1rem; font-weight: 800; color: #93c5fd; letter-spacing: .02em; }
.header-right { display: flex; align-items: center; gap: 16px; font-size: .85rem; color: rgba(255,255,255,.7); }
#reloj-display { font-size: 1.1rem; font-weight: 700; color: white; }
.dot-ws { width: 8px; height: 8px; border-radius: 50%; background: #4a5568; }
.dot-ws.ok { background: #4ade80; box-shadow: 0 0 6px #4ade80; }

/* Layout principal: tres columnas */
.layout { flex: 1; display: grid; grid-template-columns: 280px 1fr 280px; gap: 1px; background: var(--borde); overflow: hidden; }

/* Columnas laterales */
.col-lateral { background: var(--card); padding: 16px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
.col-titulo { font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: .12em; color: var(--texto2); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--borde); }

/* Tarjeta de consultorio / módulo */
.item-card { background: var(--card2); border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; border: 1.5px solid var(--borde); box-shadow: 0 1px 3px rgba(0,0,0,.06); transition: all .4s; }
.item-card.activo { border-color: var(--azul); background: var(--azul-lt); box-shadow: 0 2px 8px rgba(30,64,175,.12); }
.item-card.libre { opacity: .45; }
.item-num { font-size: .72rem; font-weight: 700; color: var(--texto2); text-transform: uppercase; margin-bottom: 3px; }
.item-nombre { font-size: 1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--texto); }
.item-nombre.libre { font-size: .85rem; color: #94a3b8; font-style: italic; }
.item-pro { font-size: .72rem; color: var(--texto2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Animación sonar */
@keyframes sonandoPulso {
    0%, 100% { border-color: var(--azul); background: var(--azul-lt); }
    50% { border-color: #3b82f6; background: #bfdbfe; box-shadow: 0 0 20px rgba(30,64,175,.4); transform: scale(1.03); }
}
.item-card.sonando { animation: sonandoPulso .6s ease-in-out 3; }

/* Centro - llamado actual */
.col-centro { background: var(--fondo); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; position: relative; }

/* Animación de llamado */
.llamado-container { display: flex; flex-direction: column; align-items: center; gap: 16px; animation: fadeIn .4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: scale(1); } }
@keyframes pulso { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
.llamado-etiqueta { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .18em; color: var(--texto2); }
.llamado-nombre { font-size: clamp(2rem, 5vw, 3.6rem); font-weight: 900; color: var(--texto); line-height: 1.1; animation: pulso 2s ease-in-out infinite; }
.llamado-destino { font-size: 1.3rem; color: var(--azul); font-weight: 700; }
.llamado-tipo-badge { font-size: .75rem; padding: 4px 14px; border-radius: 99px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
.badge-admision { background: rgba(217,119,6,.12); color: #92400e; border: 1.5px solid var(--naranja); }
.badge-profesional { background: rgba(30,64,175,.1); color: var(--azul); border: 1.5px solid var(--azul); }

/* Cola de espera en centro */
.cola-siguiente { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.sig-item { background: rgba(30,64,175,.07); border: 1px solid var(--borde); border-radius: 6px; padding: 4px 12px; font-size: .72rem; color: var(--texto2); }

/* Sin llamados */
.sin-llamado { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.sin-llamado-icono { font-size: 5rem; }
/* La campana por defecto y el texto van atenuados; un logo cargado se ve nítido. */
.sin-llamado-icono [data-logo-default] { opacity: .25; }
.sin-llamado-txt { font-size: 1rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--texto); opacity: .25; }

/* Barra de progreso del llamado */
.progreso-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: var(--azul); transition: width linear; border-radius: 0 3px 0 0; }
</style>
</head>
<body>

<div class="header">
    <div class="logo" data-titulo-base="">TURNERO CERTIMEDIC</div>
    <div class="header-right">
        <span id="reloj-display">--:--:--</span>
        <div class="dot-ws" id="dot-ws"></div>
        <button onclick="salir()" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:7px;padding:6px 12px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit">Salir</button>
    </div>
</div>

<div class="layout">
    <!-- Consultorios -->
    <div class="col-lateral" id="col-consultorios">
        <div class="col-titulo">Consultorios</div>
        <div id="lista-consultorios"></div>
    </div>

    <!-- Centro -->
    <div class="col-centro" id="col-centro">
        <div class="sin-llamado" id="sin-llamado">
            <div class="sin-llamado-icono" data-display-logo>
                <span data-logo-default>
                    <svg width="90" height="90" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M12 22a2.4 2.4 0 0 0 2.4-2.4H9.6A2.4 2.4 0 0 0 12 22zm7.2-5.6v-5.4c0-3.43-2.04-6.3-5.1-6.97V3a1.9 1.9 0 0 0-3.8 0v1.03C7.24 4.7 5.2 7.57 5.2 11v5.4L3.2 18.4v.4h17.6v-.4z"/>
                    </svg>
                </span>
                <img data-logo-img alt="Logo" style="display:none; max-width:220px; max-height:220px; object-fit:contain;">
            </div>
            <div class="sin-llamado-txt">En espera</div>
        </div>
        <div class="llamado-container" id="llamado-actual" style="display:none"></div>
        <div class="progreso-bar" id="progreso-bar" style="width:0"></div>
        <div class="cola-siguiente" id="cola-siguiente"></div>
    </div>

    <!-- Módulos admisiones -->
    <div class="col-lateral" id="col-admisiones">
        <div class="col-titulo">Admisiones</div>
        <div id="lista-modulos"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/branding.js"></script>
<script>
// ── Reloj ───────────────────────────────────────────────────────
function actualizarReloj() {
    document.getElementById('reloj-display').textContent = new Date().toLocaleTimeString('es-CO');
}
setInterval(actualizarReloj, 1000);
actualizarReloj();

// Botón "Salir": vuelve al menú principal.
function salir() {
    window.location.href = '/';
}

// ── Estado del display ──────────────────────────────────────────
const estado = {
    consultorios: {}, // { profesional: { nombre_paciente, consultorio, estado } }
    modulos: {}, // { 'Módulo 1': { nombre_paciente, estado } }
    colaCalls: [], // Queue de anuncios { tipo, nombre_paciente, destino, subtitulo }
    llamadoActivo: null,
    progresoTimer: null,
    progresoStart: null,
};

const DURACION_LLAMADO = 8000; // ms

// ── Web Audio beeps ─────────────────────────────────────────────
// Se reutiliza un único AudioContext. Crear uno nuevo por cada beep agota el
// límite de contextos del navegador (deja de sonar tras unas pocas veces) y los
// deja en estado "suspended" por la política de autoplay. Antes de cada sonido
// el contexto se reanuda (resume) controlando la promesa, equivalente a
// reiniciar el objeto de audio antes de reproducirlo.
let audioCtx = null;

function getAudioCtx() {
    if (!audioCtx) {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch {
            return null;
        }
    }
    return audioCtx;
}

// La política de autoplay exige un gesto del usuario para habilitar el sonido.
// Cualquier interacción reanuda el contexto si quedó suspendido.
function desbloquearAudio() {
    const ctx = getAudioCtx();
    if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
}
document.addEventListener('click', desbloquearAudio);
document.addEventListener('keydown', desbloquearAudio);

function beep(frecuencia = 880, duracion = 150) {
    try {
        const ctx = getAudioCtx();
        if (!ctx) return;
        // Reiniciar/reanudar el contexto antes de sonar y controlar la promesa
        // para no lanzar excepción por las políticas de autoplay del navegador.
        if (ctx.state === 'suspended') ctx.resume().catch(() => {});
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = frecuencia;
        gain.gain.setValueAtTime(.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + duracion / 1000);
        osc.start();
        osc.stop(ctx.currentTime + duracion / 1000 + .05);
    } catch {}
}

function beepDoble() {
    beep(880, 150);
    setTimeout(() => beep(1100, 180), 250);
    setTimeout(() => beep(1320, 180), 500);
}

// ── Render consultorios ─────────────────────────────────────────
function renderConsultorios() {
    const lista = document.getElementById('lista-consultorios');
    const items = Object.values(estado.consultorios);
    if (!items.length) {
        lista.innerHTML = '<div style="font-size:.8rem;color:rgba(255,255,255,.2);text-align:center;padding:20px">Sin consultorios activos</div>';
        return;
    }
    // Ordenar por consultorio
    items.sort((a, b) => (a.consultorio || '').localeCompare(b.consultorio || '', undefined, { numeric: true }));
    lista.innerHTML = items.map(c => {
        const prof = (c.profesional || '').replace(/"/g, '&quot;');
        return `<div class="item-card activo" data-profesional="${prof}">
            <div class="item-num">Consultorio ${c.consultorio || '—'}</div>
            <div class="item-nombre">${c.nombre_paciente || 'PACIENTE'}</div>
        </div>`;
    }).join('');
}

// ── Render módulos admisiones ───────────────────────────────────
function renderModulos() {
    const lista = document.getElementById('lista-modulos');
    const items = Object.entries(estado.modulos);
    if (!items.length) {
        lista.innerHTML = '<div style="font-size:.8rem;color:rgba(255,255,255,.2);text-align:center;padding:20px">Sin módulos activos</div>';
        return;
    }
    lista.innerHTML = items.map(([modulo, data]) => {
        const libre = !data || !data.nombre_paciente;
        return `<div class="item-card ${libre ? 'libre' : 'activo'}">
            <div class="item-num">${modulo}</div>
            <div class="item-nombre ${libre ? 'libre' : ''}">${libre ? '(Libre)' : data.nombre_paciente}</div>
        </div>`;
    }).join('');
}

// ── Cola de anuncios ────────────────────────────────────────────
function encolarLlamado(llamado) {
    estado.colaCalls.push(llamado);
    if (!estado.llamadoActivo) procesarSiguiente();
    renderColaSiguiente();
}

function procesarSiguiente() {
    if (!estado.colaCalls.length) {
        ocultarLlamado();
        return;
    }
    const siguiente = estado.colaCalls.shift();
    mostrarLlamado(siguiente);
    renderColaSiguiente();
}

function mostrarLlamado(llamado) {
    estado.llamadoActivo = llamado;
    clearTimeout(estado.progresoTimer);

    const el = document.getElementById('llamado-actual');
    const sinEl = document.getElementById('sin-llamado');
    sinEl.style.display = 'none';
    el.style.display = 'flex';

    const tipoBadge = llamado.tipo === 'admision'
        ? '<span class="llamado-tipo-badge badge-admision">Admisiones</span>'
        : '<span class="llamado-tipo-badge badge-profesional">Consultorio</span>';

    el.innerHTML = `
        ${tipoBadge}
        <div class="llamado-etiqueta">Pasar a</div>
        <div class="llamado-nombre">${llamado.nombre_paciente || 'PACIENTE'}</div>
        <div class="llamado-destino">${llamado.destino || ''}</div>
    `;

    // Barra de progreso
    const barra = document.getElementById('progreso-bar');
    barra.style.transition = 'none';
    barra.style.width = '100%';
    setTimeout(() => {
        barra.style.transition = `width ${DURACION_LLAMADO}ms linear`;
        barra.style.width = '0%';
    }, 50);

    beepDoble();

    estado.progresoTimer = setTimeout(procesarSiguiente, DURACION_LLAMADO);
}

function ocultarLlamado() {
    estado.llamadoActivo = null;
    document.getElementById('llamado-actual').style.display = 'none';
    document.getElementById('sin-llamado').style.display = 'flex';
    document.getElementById('progreso-bar').style.width = '0';
}

function renderColaSiguiente() {
    const el = document.getElementById('cola-siguiente');
    if (!estado.colaCalls.length) { el.innerHTML = ''; return; }
    el.innerHTML = estado.colaCalls.map(c =>
        `<div class="sig-item">${c.nombre_paciente}</div>`
    ).join('');
}

// Cancela inmediatamente la visualización de un profesional (timer + cola)
function cancelarLlamadoProfesional(prof) {
    if (!prof) return;
    estado.colaCalls = estado.colaCalls.filter(c => c.nombre_profesional !== prof);
    renderColaSiguiente();
    if (estado.llamadoActivo?.nombre_profesional === prof) {
        clearTimeout(estado.progresoTimer);
        estado.llamadoActivo = null;
        procesarSiguiente();
    }
}

// Cancela inmediatamente la visualización de un llamado de admisiones (timer + cola).
// Se identifica por id de paciente o, en su defecto, por módulo.
function cancelarLlamadoAdmision(id, modulo) {
    const coincide = c => c.tipo === 'admision' &&
        ((id != null && c.id === id) || (modulo && c.modulo === modulo));
    estado.colaCalls = estado.colaCalls.filter(c => !coincide(c));
    renderColaSiguiente();
    if (estado.llamadoActivo && coincide(estado.llamadoActivo)) {
        clearTimeout(estado.progresoTimer);
        estado.llamadoActivo = null;
        procesarSiguiente();
    }
}

// ── Socket.io ───────────────────────────────────────────────────
const socket = io();

socket.on('connect', () => {
    document.getElementById('dot-ws').classList.add('ok');
    socket.emit('join', { tipo: 'display', terminalId: 'display-' + Date.now() });
    cargarEstadoInicial();
});
socket.on('disconnect', () => document.getElementById('dot-ws').classList.remove('ok'));
// Recarga branding (título/logo) cuando Admin cambia la configuración.
socket.on('config:actualizada', () => window.recargarBranding && window.recargarBranding());

// Profesional solicita volver a sonar
socket.on('display:sonar', (data) => {
    beepDoble();
    const prof = data.nombre_profesional;
    if (prof) {
        const tarjetas = document.querySelectorAll('.item-card[data-profesional]');
        for (const card of tarjetas) {
            if (card.dataset.profesional === prof) {
                card.classList.remove('sonando');
                void card.offsetWidth; // reiniciar animación
                card.classList.add('sonando');
                card.addEventListener('animationend', () => card.classList.remove('sonando'), { once: true });
                break;
            }
        }
    }
});

// Admisiones llama un paciente
socket.on('admision:llamando', (p) => {
    const nombre = p.nombre_completo || [p.primer_nombre, p.primer_apellido].filter(Boolean).join(' ');
    const modulo = p.modulo_admision || 'Admisiones';

    // Actualizar estado del módulo
    if (modulo) estado.modulos[modulo] = { nombre_paciente: nombre, estado: 'llamando' };
    renderModulos();

    encolarLlamado({ tipo: 'admision', id: p.id, modulo, nombre_paciente: nombre, destino: modulo });
});

// Admisiones solicita volver a sonar la alerta de un paciente ya llamado.
// Replica de inmediato la alerta (audio + centro), igual que "Sonar" de Profesionales:
// el paciente salta al frente y suena el timbre sin pasar por la cola de anuncios.
socket.on('admision:sonar', (p) => {
    const nombre = p.nombre_completo || [p.primer_nombre, p.primer_apellido].filter(Boolean).join(' ');
    const modulo = p.modulo_admision || 'Admisiones';

    if (modulo) estado.modulos[modulo] = { nombre_paciente: nombre, estado: 'llamando' };
    renderModulos();

    // Descarta cualquier instancia previa de este paciente en la cola y muestra al frente.
    estado.colaCalls = estado.colaCalls.filter(c => !(c.tipo === 'admision' && c.id === p.id));
    clearTimeout(estado.progresoTimer);
    mostrarLlamado({ tipo: 'admision', id: p.id, modulo, nombre_paciente: nombre, destino: modulo });
});

// Admisiones confirma ingreso a Biofile
socket.on('admision:completada', (p) => {
    const modulo = p.modulo_admision;
    if (modulo && estado.modulos[modulo]) {
        delete estado.modulos[modulo];
    }
    renderModulos();
});

// Admisiones devuelve/cancela paciente a espera — desaparece al instante del display
socket.on('admision:devuelto', (p) => {
    // modulo_admision ya viene en NULL tras el UPDATE; se usa modulo_anterior.
    const modulo = p.modulo_anterior || p.modulo_admision;
    if (modulo && estado.modulos[modulo]) delete estado.modulos[modulo];
    renderModulos();
    cancelarLlamadoAdmision(p.id, modulo);
});

// Profesional llama un paciente
socket.on('asignacion:llamando', (a) => {
    const nombre = a.nombre_paciente || a.numero_identificacion;
    const consultorio = a.consultorio || a.consultorio_profesional;
    const prof = a.nombre_profesional;

    // Cancelar display anterior de este profesional antes de mostrar el nuevo
    cancelarLlamadoProfesional(prof);

    if (prof) {
        estado.consultorios[prof] = {
            profesional: prof, nombre_paciente: nombre,
            consultorio, estado: 'llamando'
        };
    }
    renderConsultorios();

    encolarLlamado({
        tipo: 'profesional',
        nombre_paciente: nombre,
        nombre_profesional: prof,
        destino: consultorio ? `Consultorio ${consultorio}` : (a.area || 'Consultorio')
    });
});

// Profesional pasa a en atención — sale de la columna izquierda
socket.on('asignacion:en_atencion', (a) => {
    const prof = a.nombre_profesional;
    if (prof) delete estado.consultorios[prof];
    renderConsultorios();
});

// Profesional cancela llamado — sale de columna izquierda y del display central
socket.on('asignacion:cancelado', (a) => {
    const prof = a.nombre_profesional;
    cancelarLlamadoProfesional(prof);
    if (prof) delete estado.consultorios[prof];
    renderConsultorios();
});

// Profesional finaliza
socket.on('asignacion:finalizado', (a) => {
    const prof = a.nombre_profesional;
    if (prof) delete estado.consultorios[prof];
    renderConsultorios();
});

// ── Estado inicial (recuperación tras F5 / corte de luz) ────────
// Antes de depender de los WebSockets, el Display consulta los pacientes que están
// "Llamando" ahora mismo y reconstruye tanto los paneles laterales (módulos y
// consultorios) como el anuncio central, recuperando el estado exacto.
async function cargarEstadoInicial() {
    try {
        const resp = await fetch('/api/display/activos');
        if (!resp.ok) return;
        const { activos } = await resp.json();

        // El servidor es la fuente autoritativa: se parte de cero para que el estado
        // quede exacto (sin entradas obsoletas si esto se ejecuta en una reconexión).
        estado.consultorios = {};
        estado.modulos = {};

        for (const a of activos) {
            if (a.tipo === 'profesional' && a.nombre_profesional) {
                estado.consultorios[a.nombre_profesional] = {
                    profesional: a.nombre_profesional,
                    nombre_paciente: a.nombre_paciente,
                    consultorio: a.consultorio,
                    estado: 'llamando'
                };
                if (!yaAnunciado(a)) {
                    encolarLlamado({
                        tipo: 'profesional',
                        nombre_paciente: a.nombre_paciente,
                        nombre_profesional: a.nombre_profesional,
                        destino: a.destino
                    });
                }
            } else if (a.tipo === 'admision' && a.modulo) {
                estado.modulos[a.modulo] = { nombre_paciente: a.nombre_paciente, estado: 'llamando' };
                if (!yaAnunciado(a)) {
                    encolarLlamado({
                        tipo: 'admision',
                        id: a.id,
                        modulo: a.modulo,
                        nombre_paciente: a.nombre_paciente,
                        destino: a.destino
                    });
                }
            }
        }

        renderConsultorios();
        renderModulos();
    } catch {}
}

// ¿El anuncio (activo o en cola) ya representa a este paciente? Evita duplicados
// en el centro cuando cargarEstadoInicial corre en una reconexión de socket.
function yaAnunciado(a) {
    const todos = estado.colaCalls.concat(estado.llamadoActivo ? [estado.llamadoActivo] : []);
    if (a.tipo === 'profesional') {
        return todos.some(c => c.tipo === 'profesional' && c.nombre_profesional === a.nombre_profesional);
    }
    return todos.some(c => c.tipo === 'admision' && c.id === a.id);
}

// Recuperación inmediata al cargar la página (F5 / corte de luz), sin esperar a que
// el socket conecte. La reconexión del socket vuelve a sincronizar de forma idempotente.
cargarEstadoInicial();
</script>
</body>
</html>
