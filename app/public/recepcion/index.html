<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recepción — Turnero</title>
<style>
:root {
    --azul: #1a3a6e;
    --azul2: #2563eb;
    --verde: #16a34a;
    --naranja: #d97706;
    --rojo: #dc2626;
    --gris: #64748b;
    --fondo: #f1f5f9;
    --card: #ffffff;
    --borde: #e2e8f0;
    --texto: #1e293b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); color: var(--texto); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.header { background: var(--azul); color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header h1 { font-size: 1.1rem; font-weight: 600; }
.header-info { display: flex; align-items: center; gap: 16px; font-size: 0.82rem; }
.dot-ws { width: 8px; height: 8px; border-radius: 50%; background: #888; transition: background .3s; }
.dot-ws.ok { background: #4ade80; }
#reloj { font-size: 0.9rem; font-weight: 600; opacity: .9; }

/* Layout */
.layout { flex: 1; display: grid; grid-template-columns: 1fr 340px; gap: 0; overflow: hidden; }

/* Panel izquierdo - scanner/formulario */
.panel-scan { padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }

/* Pantalla de espera de escaneo */
.scan-waiting { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
.scan-icon { font-size: 80px; opacity: .15; }
.scan-label { font-size: 1.5rem; font-weight: 700; color: var(--azul); }
.scan-sublabel { color: var(--gris); font-size: 0.9rem; }
.btn-manual { background: none; border: 2px solid var(--azul2); color: var(--azul2); padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all .2s; }
.btn-manual:hover { background: var(--azul2); color: white; }

/* Card de preview tras escaneo */
.scan-preview { background: var(--card); border-radius: 12px; border: 2px solid var(--azul2); padding: 20px; display: none; flex-direction: column; gap: 14px; }
.scan-preview.visible { display: flex; }
.preview-header { display: flex; align-items: center; justify-content: space-between; }
.preview-titulo { font-weight: 700; color: var(--azul); font-size: 1.05rem; }
.badge-formato { background: #dbeafe; color: #1d4ed8; font-size: 0.72rem; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
.preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.campo-grupo { display: flex; flex-direction: column; gap: 4px; }
.campo-grupo.full { grid-column: 1/-1; }
.campo-label { font-size: 0.72rem; font-weight: 600; color: var(--gris); text-transform: uppercase; letter-spacing: .05em; }
.campo-input { border: 1.5px solid var(--borde); border-radius: 7px; padding: 7px 10px; font-size: 0.9rem; font-family: inherit; background: white; transition: border .2s; }
.campo-input:focus { outline: none; border-color: var(--azul2); }

/* Prioridad selector */
.prioridad-row { display: flex; gap: 10px; }
.prioridad-btn { flex: 1; padding: 8px; border-radius: 8px; border: 2px solid var(--borde); background: white; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all .2s; }
.prioridad-btn[data-val="normal"].activo { border-color: var(--verde); background: #dcfce7; color: var(--verde); }
.prioridad-btn[data-val="media"].activo { border-color: var(--naranja); background: #fef3c7; color: var(--naranja); }
.prioridad-btn[data-val="alta"].activo { border-color: var(--rojo); background: #fee2e2; color: var(--rojo); }

/* Botones de acción */
.btns-accion { display: flex; gap: 10px; }
.btn-registrar { flex: 1; background: var(--azul); color: white; border: none; border-radius: 8px; padding: 11px 16px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background .2s; }
.btn-registrar:hover { background: #152e57; }
.btn-registrar:disabled { background: #94a3b8; cursor: default; }
.btn-cancelar { background: none; border: 2px solid var(--borde); color: var(--gris); border-radius: 8px; padding: 11px 16px; font-size: 0.85rem; cursor: pointer; }
.btn-cancelar:hover { border-color: var(--rojo); color: var(--rojo); }

/* Mensaje resultado */
.msg-resultado { border-radius: 10px; padding: 14px 16px; font-weight: 600; display: none; }
.msg-resultado.ok { background: #dcfce7; color: var(--verde); border: 1.5px solid #86efac; display: block; }
.msg-resultado.error { background: #fee2e2; color: var(--rojo); border: 1.5px solid #fca5a5; display: block; }
.msg-resultado.warn { background: #fef3c7; color: #92400e; border: 1.5px solid #fcd34d; display: block; }

/* Panel derecho - cola */
.panel-cola { background: var(--card); border-left: 1px solid var(--borde); display: flex; flex-direction: column; overflow: hidden; }
.cola-header { padding: 14px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: space-between; }
.cola-titulo { font-weight: 700; font-size: 0.95rem; color: var(--azul); }
.cola-count { background: var(--azul); color: white; font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
.cola-lista { flex: 1; overflow-y: auto; padding: 8px; }
.cola-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; transition: background .15s; border: 1.5px solid transparent; }
.cola-item:hover { background: #f8fafc; border-color: var(--borde); }
.badge-pri { font-size: 0.68rem; font-weight: 700; padding: 2px 6px; border-radius: 99px; min-width: 48px; text-align: center; }
.pri-alta { background: #fee2e2; color: var(--rojo); }
.pri-media { background: #fef3c7; color: #92400e; }
.pri-normal { background: #f1f5f9; color: var(--gris); }
.cola-nombre { flex: 1; font-size: 0.85rem; font-weight: 600; }
.cola-estado { font-size: 0.72rem; color: var(--gris); }
.estado-esperando { color: #64748b; }
.estado-llamando { color: var(--naranja); }
.estado-admisionado { color: var(--verde); }

/* Botón cambio prioridad */
.btn-pri-change { font-size: 0.7rem; padding: 2px 6px; border-radius: 5px; border: 1px solid var(--borde); background: white; cursor: pointer; color: var(--gris); display: none; }
.cola-item:hover .btn-pri-change { display: inline; }

/* Botón editar paciente (pequeño y discreto, visible al pasar el cursor) */
.btn-edit-pac { font-size: 0.7rem; padding: 2px 6px; border-radius: 5px; border: 1px solid var(--borde); background: white; cursor: pointer; color: var(--gris); display: none; }
.cola-item:hover .btn-edit-pac { display: inline; }
.btn-edit-pac:hover { border-color: var(--azul2); color: var(--azul2); }

/* Botón eliminar paciente (texto rojo, mismo patrón hover que editar) */
.btn-del-pac { font-size: 0.7rem; padding: 2px 6px; border-radius: 5px; border: 1px solid var(--borde); background: white; cursor: pointer; color: var(--rojo); display: none; }
.cola-item:hover .btn-del-pac { display: inline; }
.btn-del-pac:hover { border-color: var(--rojo); background: #fef2f2; }

/* Búsqueda en la cabecera de la cola */
.cola-header-top { display: flex; align-items: center; justify-content: space-between; }
.cola-buscar { border: 1.5px solid var(--borde); border-radius: 7px; padding: 6px 10px; font-size: 0.82rem; font-family: inherit; width: 100%; }
.cola-buscar:focus { outline: none; border-color: var(--azul2); }

/* Grupo colapsable "Admisionados" */
.cola-grupo-header { padding: 8px 10px; margin-top: 6px; border-top: 1px solid var(--borde); font-size: 0.78rem; font-weight: 700; color: var(--gris); cursor: pointer; user-select: none; }
.cola-grupo-header:hover { color: var(--azul); }
.cola-item.atenuado { opacity: .6; }

/* Banner de reconexión (franja bajo el header) */
.banner-reconexion { background: #f59e0b; color: #1e293b; font-weight: 700; text-align: center; padding: 8px 16px; font-size: 0.85rem; flex-shrink: 0; }

/* Input scanner oculto */
#scan-input { position: fixed; left: -9999px; top: -9999px; width: 1px; height: 1px; opacity: 0; }

/* Modal cambio prioridad */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.visible { display: flex; }
.modal { background: white; border-radius: 12px; padding: 24px; width: 300px; }
.modal h3 { font-size: 1rem; color: var(--azul); margin-bottom: 14px; }
.modal-btns { display: flex; gap: 8px; margin-top: 16px; }

/* Vacío */
.cola-vacia { text-align: center; padding: 40px 16px; color: var(--gris); font-size: 0.9rem; }
</style>
</head>
<body data-modulo="Recepción">
<input type="text" id="scan-input" autocomplete="off">

<div class="header">
    <h1 data-titulo-base="Recepción">Recepción — Turnero</h1>
    <div class="header-info">
        <span id="reloj">--:--</span>
        <div class="dot-ws" id="dot-ws"></div>
        <button onclick="salir()" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:7px;padding:6px 12px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit">Salir</button>
    </div>
</div>

<!-- Banner de reconexión: visible solo mientras el socket está caído -->
<div class="banner-reconexion" id="banner-reconexion" style="display:none">⚠ Sin conexión en tiempo real — reconectando…</div>

<div class="layout">
    <!-- Panel izquierdo -->
    <div class="panel-scan">
        <!-- Formulario de registro de paciente (vista por defecto) -->
        <div class="scan-preview visible" id="vista-preview">
            <div class="preview-header">
                <span class="preview-titulo" id="preview-titulo">Datos del paciente</span>
                <span class="badge-formato" id="badge-formato">MANUAL</span>
            </div>

            <div class="preview-grid">
                <!-- 1. Número de cédula -->
                <div class="campo-grupo">
                    <label class="campo-label">Número de cédula *</label>
                    <input class="campo-input" id="f-cedula" placeholder="12345678901" maxlength="20">
                </div>
                <!-- 2. Tipo de documento -->
                <div class="campo-grupo">
                    <label class="campo-label">Tipo de documento</label>
                    <select class="campo-input" id="f-tipo">
                        <option value="CC">Cédula CC</option>
                        <option value="TI">Tarjeta Identidad TI</option>
                        <option value="CE">Cédula Extranjería CE</option>
                        <option value="PA">Pasaporte PA</option>
                        <option value="RC">Registro Civil RC</option>
                    </select>
                </div>
                <!-- 3. Fecha de nacimiento -->
                <div class="campo-grupo">
                    <label class="campo-label">Fecha de nacimiento</label>
                    <input class="campo-input" id="f-fecha" placeholder="DD/MM/AAAA" maxlength="10" inputmode="numeric">
                </div>
                <!-- 4. Primer apellido -->
                <div class="campo-grupo">
                    <label class="campo-label">Primer apellido *</label>
                    <input class="campo-input" id="f-apellido1" placeholder="GARCIA">
                </div>
                <!-- 5. Segundo apellido -->
                <div class="campo-grupo">
                    <label class="campo-label">Segundo apellido</label>
                    <input class="campo-input" id="f-apellido2" placeholder="MARTINEZ">
                </div>
                <!-- 6. Primer nombre -->
                <div class="campo-grupo">
                    <label class="campo-label">Primer nombre *</label>
                    <input class="campo-input" id="f-nombre1" placeholder="JUAN">
                </div>
                <!-- 7. Segundo nombre -->
                <div class="campo-grupo">
                    <label class="campo-label">Segundo nombre</label>
                    <input class="campo-input" id="f-nombre2" placeholder="PABLO">
                </div>
                <!-- 8. Sexo -->
                <div class="campo-grupo">
                    <label class="campo-label">Sexo</label>
                    <select class="campo-input" id="f-sexo">
                        <option value="">—</option>
                        <option value="M">M</option>
                        <option value="F">F</option>
                    </select>
                </div>
            </div>

            <!-- 9. Nota para admisiones (opcional, máx 300) -->
            <div class="campo-grupo full">
                <label class="campo-label">Nota para admisiones</label>
                <textarea class="campo-input" id="f-nota" maxlength="300" rows="2"
                          placeholder="Observación para admisiones (opcional)"
                          oninput="actualizarContadorNota()"
                          style="resize:vertical;min-height:40px;width:100%"></textarea>
                <div id="nota-contador" style="font-size:.7rem;color:var(--gris);text-align:right;margin-top:2px">0/300</div>
            </div>

            <!-- Prioridad del registro (se oculta en modo edición) -->
            <div class="campo-grupo full" id="grupo-prioridad">
                <label class="campo-label">Prioridad</label>
                <div class="prioridad-row" id="form-prioridad-row">
                    <button type="button" class="prioridad-btn activo" data-val="normal" onclick="seleccionarPrioridadForm('normal')">Normal</button>
                    <button type="button" class="prioridad-btn" data-val="media" onclick="seleccionarPrioridadForm('media')">Media</button>
                    <button type="button" class="prioridad-btn" data-val="alta" onclick="seleccionarPrioridadForm('alta')">Alta</button>
                </div>
            </div>

            <div id="msg-resultado" class="msg-resultado"></div>

            <div class="btns-accion">
                <button class="btn-registrar" id="btn-registrar" onclick="registrarPaciente()">Registrar paciente</button>
                <button class="btn-cancelar" onclick="resetearFormulario()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Panel derecho - cola del día -->
    <div class="panel-cola">
        <div class="cola-header">
            <div class="cola-header-top">
                <span class="cola-titulo">Cola del día</span>
                <span class="cola-count" id="cola-count">0</span>
            </div>
            <input type="text" class="cola-buscar" id="cola-buscar" placeholder="Buscar nombre o cédula…" oninput="filtrarCola(this.value)">
        </div>
        <div class="cola-lista" id="cola-lista">
            <div class="cola-vacia">Sin pacientes registrados hoy</div>
        </div>
    </div>
</div>

<!-- Modal cambio de prioridad -->
<div class="modal-overlay" id="modal-prioridad">
    <div class="modal">
        <h3>Cambiar prioridad</h3>
        <div style="font-size:.9rem;color:#64748b;margin-bottom:8px" id="modal-nombre-pac"></div>
        <div class="prioridad-row">
            <button class="prioridad-btn" data-val="normal" onclick="cambiarPrioridad('normal')">Normal</button>
            <button class="prioridad-btn" data-val="media" onclick="cambiarPrioridad('media')">Media</button>
            <button class="prioridad-btn" data-val="alta" onclick="cambiarPrioridad('alta')">Alta</button>
        </div>
        <div class="modal-btns">
            <button class="btn-cancelar" style="width:100%" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/branding.js"></script>
<script>
// ── Configuración terminal ─────────────────────────────────────
const TERMINAL_ID = (() => {
    const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
    let id = localStorage.getItem('terminal_id');
    if (!id || !UUID_RE.test(id)) {
        id = crypto.randomUUID
            ? crypto.randomUUID()
            : ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
                (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
        localStorage.setItem('terminal_id', id);
    }
    return id;
})();

// ── Reloj ───────────────────────────────────────────────────────
function actualizarReloj() {
    const ahora = new Date();
    document.getElementById('reloj').textContent = ahora.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(actualizarReloj, 1000);
actualizarReloj();

// ── Socket.io ───────────────────────────────────────────────────
const socket = io();
socket.on('connect', () => {
    document.getElementById('dot-ws').classList.add('ok');
    document.getElementById('banner-reconexion').style.display = 'none';
    socket.emit('join', { tipo: 'recepcion', terminalId: TERMINAL_ID });
    cargarCola();
});
socket.on('disconnect', () => {
    document.getElementById('dot-ws').classList.remove('ok');
    document.getElementById('banner-reconexion').style.display = '';
});
socket.on('paciente:nuevo', () => cargarCola());
socket.on('paciente:prioridad', () => cargarCola());
socket.on('paciente:actualizado', () => cargarCola());
socket.on('paciente:eliminado', () => cargarCola());
socket.on('config:actualizada', () => window.recargarBranding && window.recargarBranding());
socket.on('admision:completada', () => cargarCola());

// ── Estado de la app ────────────────────────────────────────────
// Prioridad elegida en el formulario de registro (default 'normal').
let prioridadActual = 'normal';
// Filtro de la cola (nombre o cédula) y estado del grupo colapsable de admisionados.
let filtroCola = '';
let admisionadosAbierto = false;
let pacienteModalId = null;
// Id del paciente en edición. null = el formulario registra (INSERT); con valor = actualiza (UPDATE).
let editandoId = null;
// Cache en memoria de la cola actual, para resolver nombre/prioridad por id sin
// interpolar texto libre del paciente dentro de atributos onclick (evita romper el
// handler y XSS con apóstrofes/HTML en el nombre).
let colaCache = [];

// Escapa texto dinámico antes de interpolarlo en un template que va a innerHTML.
function esc(v) {
    return String(v ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── Escáner ─────────────────────────────────────────────────────
const scanInput = document.getElementById('scan-input');
let scanTimer = null;

// ¿El foco está dentro de un campo donde el usuario está escribiendo? (entonces NO
// robamos el foco). Incluye el formulario de registro (.scan-preview) y el buscador de
// la cola (#cola-buscar), que vive en otro panel y antes se quedaba sin poder escribir.
function focoEnFormulario() {
    const a = document.activeElement;
    if (!a) return false;
    return (a.closest && a.closest('.scan-preview')) || a.id === 'cola-buscar';
}

// Mantener el foco en el input oculto mientras el usuario no esté escribiendo en un campo,
// para que el lector de cédula siempre capture el escaneo.
function mantenerFocoScanner() {
    if (!focoEnFormulario()) scanInput.focus();
}
document.addEventListener('click', (e) => {
    if (!e.target.closest('.panel-scan .scan-preview') && !e.target.closest('.modal')
        && e.target.id !== 'cola-buscar') {
        mantenerFocoScanner();
    }
});
mantenerFocoScanner();

scanInput.addEventListener('blur', () => {
    setTimeout(mantenerFocoScanner, 20);
});

scanInput.addEventListener('input', () => {
    clearTimeout(scanTimer);
    if (scanInput.value.length < 4) return;
    scanTimer = setTimeout(() => {
        const raw = scanInput.value;
        scanInput.value = '';
        if (raw.length >= 4) procesarEscaneo(raw);
    }, 200);
});

scanInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && scanInput.value.length >= 4) {
        clearTimeout(scanTimer);
        const raw = scanInput.value;
        scanInput.value = '';
        procesarEscaneo(raw);
        e.preventDefault();
    }
});

// ── Parsers de cédula colombiana ────────────────────────────────
function parsearCedula(raw) {
    const datos = {};

    // 1. Intentar JSON
    const rawTrim = raw.trim();
    if (rawTrim.startsWith('{') || rawTrim.startsWith('[')) {
        try {
            const d = rawTrim.startsWith('[') ? JSON.parse(rawTrim)[0] : JSON.parse(rawTrim);
            return { datos: mapearJSON(d), formato: 'QR/JSON' };
        } catch {}
    }

    // 2. Tab-separado (la mayoría de lectores configurados en Colombia)
    if (raw.includes('\t')) {
        return { datos: parsearTabs(raw.split('\t')), formato: 'Tab-separado' };
    }

    // 3. PDF417 binario - campos por posición de bytes
    // Los lectores USB HID "teclean" los 531 bytes del PDF417
    // Campos imprimibles empiezan en byte ~48
    if (raw.length >= 80) {
        const datosbin = parsearPDF417(raw);
        if (datosbin.numero_identificacion && datosbin.primer_apellido) {
            return { datos: datosbin, formato: 'PDF417' };
        }
    }

    // 4. Solo número (escaneo incompleto o cédula simple)
    const soloNum = rawTrim.replace(/\D/g, '');
    if (soloNum.length >= 6 && soloNum.length <= 12) {
        return { datos: { numero_identificacion: soloNum }, formato: 'Número', incompleto: true };
    }

    // 5. Intentar extraer número de cédula de cualquier string
    const numMatch = raw.match(/\b(\d{6,12})\b/);
    if (numMatch) {
        return { datos: { numero_identificacion: numMatch[1] }, formato: 'Extraído', incompleto: true };
    }

    return { datos: {}, formato: 'Desconocido', incompleto: true };
}

function parsearTabs(partes) {
    // Formatos más comunes en Colombia:
    // Formato A: cedula | ap1 | ap2 | nom1 | nom2 | fecha | ciudad | sexo
    // Formato B: cedula | ap1 | ap2 | nom1 | nom2 | ciudad | fecha
    // Formato C: cedula | ap1 | nom1 | ciudad | fecha
    const p = partes.map(s => limpiarCampo(s));
    const datos = {};

    if (/^\d{5,12}$/.test(p[0])) {
        datos.numero_identificacion = p[0];
        if (p.length >= 5) {
            datos.primer_apellido = p[1] || '';
            datos.segundo_apellido = p[2] || '';
            datos.primer_nombre = p[3] || '';
            datos.segundo_nombre = p[4] || '';
        } else if (p.length >= 3) {
            datos.primer_apellido = p[1] || '';
            datos.primer_nombre = p[2] || '';
        }
        // Detectar fecha y ciudad entre los campos restantes
        for (let i = 5; i < p.length; i++) {
            if (!p[i]) continue;
            if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(p[i]) || /^\d{8}$/.test(p[i])) {
                datos.fecha_nacimiento = formatearFecha(p[i]);
            } else if (p[i].length > 3 && /^[A-ZÁÉÍÓÚÑ\s]+$/.test(p[i])) {
                datos.ciudad_expedicion = p[i];
            }
        }
    }
    return datos;
}

function parsearPDF417(raw) {
    // Posiciones de campos en el stream PDF417 de cédulas colombianas (RNEC)
    // Los null bytes (\x00) son padding que los lectores pueden omitir
    const limpio = (s) => s.replace(/[\x00-\x1F\x7F-\x9F]/g, '').trim();

    const datos = {};
    // Número de identificación: pos 48-57 (10 bytes)
    if (raw.length > 48) datos.numero_identificacion = limpio(raw.substring(48, 58));
    // Primer apellido: pos 58-79 (22 bytes)
    if (raw.length > 58) datos.primer_apellido = limpio(raw.substring(58, 80));
    // Segundo apellido: pos 80-99 (20 bytes)
    if (raw.length > 80) datos.segundo_apellido = limpio(raw.substring(80, 100));
    // Primer nombre: pos 100-119 (20 bytes)
    if (raw.length > 100) datos.primer_nombre = limpio(raw.substring(100, 120));
    // Segundo nombre: pos 120-139 (20 bytes)
    if (raw.length > 120) datos.segundo_nombre = limpio(raw.substring(120, 140));
    // Fecha nacimiento: pos 140-147 (8 bytes, formato YYYYMMDD)
    if (raw.length > 140) {
        const fs = limpio(raw.substring(140, 148));
        if (/^\d{8}$/.test(fs)) {
            datos.fecha_nacimiento = `${fs.slice(6,8)}/${fs.slice(4,6)}/${fs.slice(0,4)}`;
        }
    }
    // Ciudad expedición: pos 149-168 (20 bytes)
    if (raw.length > 149) datos.ciudad_expedicion = limpio(raw.substring(149, 169));

    return datos;
}

function mapearJSON(d) {
    return {
        numero_identificacion: d.cedula || d.numero_identificacion || d.numId || d.id || '',
        primer_apellido: d.primer_apellido || d.apellido1 || d.primerApellido || '',
        segundo_apellido: d.segundo_apellido || d.apellido2 || d.segundoApellido || '',
        primer_nombre: d.primer_nombre || d.nombre1 || d.primerNombre || d.nombre || '',
        segundo_nombre: d.segundo_nombre || d.nombre2 || d.segundoNombre || '',
        fecha_nacimiento: d.fecha_nacimiento || d.fechaNacimiento || d.fechaNac || '',
        ciudad_expedicion: d.ciudad_expedicion || d.ciudadExpedicion || d.ciudad || '',
    };
}

function limpiarCampo(s) {
    return (s || '').replace(/[\x00-\x1F]/g, '').trim().toUpperCase();
}

function formatearFecha(s) {
    if (/^\d{8}$/.test(s)) return `${s.slice(6,8)}/${s.slice(4,6)}/${s.slice(0,4)}`;
    return s;
}

// ── Procesar escaneo recibido ───────────────────────────────────
function procesarEscaneo(raw) {
    const resultado = parsearCedula(raw);
    mostrarPreview(resultado.datos, resultado.formato);
}

function mostrarPreview(datos, formato) {
    document.getElementById('badge-formato').textContent = formato || 'MANUAL';

    // Llenar campos
    setVal('f-cedula', datos.numero_identificacion || '');
    setVal('f-fecha', formatearFechaInput(datos.fecha_nacimiento || ''));
    setVal('f-apellido1', datos.primer_apellido || '');
    setVal('f-apellido2', datos.segundo_apellido || '');
    setVal('f-nombre1', datos.primer_nombre || '');
    setVal('f-nombre2', datos.segundo_nombre || '');
    setSexo(datos.sexo || '');
    setVal('f-nota', '');            // el escaneo es un registro nuevo: la nota arranca vacía
    actualizarContadorNota();

    limpiarMensaje();

    // Foco en cédula si está vacío (entrada manual); si vino del escaneo, dejamos
    // el foco en el lector para capturar el siguiente escaneo.
    if (!datos.numero_identificacion) {
        setTimeout(() => document.getElementById('f-cedula').focus(), 50);
    }
}

function setVal(id, val) {
    document.getElementById(id).value = val;
}

// ── Sexo (M/F) ──────────────────────────────────────────────────
function setSexo(val) {
    const s = (val || '').toString().trim().toUpperCase();
    document.getElementById('f-sexo').value = (s === 'M' || s === 'F') ? s : '';
}

// El escáner puede enviar el carácter 'm' o 'f' directamente al <select>.
document.getElementById('f-sexo').addEventListener('keydown', (e) => {
    const k = (e.key || '').toLowerCase();
    if (k === 'm' || k === 'f') {
        e.preventDefault();
        document.getElementById('f-sexo').value = k.toUpperCase();
    }
});

// ── Fecha de nacimiento ─────────────────────────────────────────
// Convierte el formato del escáner (aaaammdd, 8 dígitos sin separadores) a dd/mm/aaaa.
// Si ya viene con separadores (entrada manual) se respeta tal cual.
function formatearFechaInput(valor) {
    const v = (valor || '').toString().trim();
    if (/^\d{8}$/.test(v)) {
        const aa = v.slice(0, 4), mm = v.slice(4, 6), dd = v.slice(6, 8);
        const anio = +aa, mes = +mm, dia = +dd;
        const anioValido = anio >= 1900 && anio <= new Date().getFullYear();
        if (anioValido && mes >= 1 && mes <= 12 && dia >= 1 && dia <= 31) {
            return `${dd}/${mm}/${aa}`;
        }
    }
    return v;
}

// Interceptar la entrada del escáner en el campo de fecha.
document.getElementById('f-fecha').addEventListener('input', () => {
    const el = document.getElementById('f-fecha');
    if (/^\d{8}$/.test(el.value)) {
        el.value = formatearFechaInput(el.value);
    }
});

// ── Registrar paciente ──────────────────────────────────────────
// Selecciona la prioridad en el formulario (toggle de la clase 'activo' entre los 3 botones).
function seleccionarPrioridadForm(val) {
    prioridadActual = val;
    document.querySelectorAll('#form-prioridad-row .prioridad-btn').forEach(b => {
        b.classList.toggle('activo', b.dataset.val === val);
    });
}

async function registrarPaciente() {
    const cedula = document.getElementById('f-cedula').value.trim().replace(/\D/g,'');
    const apellido1 = document.getElementById('f-apellido1').value.trim().toUpperCase();
    const nombre1 = document.getElementById('f-nombre1').value.trim().toUpperCase();

    if (!cedula) { mostrarMsg('Ingrese el número de cédula', 'error'); return; }
    if (!apellido1) { mostrarMsg('Ingrese el primer apellido', 'error'); return; }
    if (!nombre1) { mostrarMsg('Ingrese el primer nombre', 'error'); return; }

    const enEdicion = editandoId !== null;
    const btn = document.getElementById('btn-registrar');
    btn.disabled = true;
    btn.textContent = enEdicion ? 'Guardando...' : 'Registrando...';

    const body = {
        numero_identificacion: cedula,
        tipo_identificacion: document.getElementById('f-tipo').value,
        fecha_nacimiento: document.getElementById('f-fecha').value.trim(),
        primer_apellido: apellido1,
        segundo_apellido: document.getElementById('f-apellido2').value.trim().toUpperCase(),
        primer_nombre: nombre1,
        segundo_nombre: document.getElementById('f-nombre2').value.trim().toUpperCase(),
        sexo: document.getElementById('f-sexo').value,
        nota: document.getElementById('f-nota').value.trim(),
        prioridad: prioridadActual
    };

    try {
        const url = enEdicion ? `/api/recepcion/${editandoId}` : '/api/recepcion/registrar';
        const resp = await fetch(url, {
            method: enEdicion ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Terminal-Id': TERMINAL_ID },
            body: JSON.stringify(body)
        });
        const data = await resp.json();

        if (enEdicion) {
            if (resp.ok) {
                mostrarMsg(`Paciente actualizado — ${nombre1} ${apellido1}`, 'ok');
                cargarCola();
                setTimeout(resetearFormulario, 1600);
            } else if (resp.status === 409 && data.error === 'cedula_duplicada') {
                mostrarMsg(`Ya existe otro paciente con cédula ${cedula} hoy`, 'warn');
            } else if (resp.status === 409) {
                mostrarMsg('El paciente ya no es editable (fue llamado o admisionado)', 'warn');
            } else {
                mostrarMsg(`Error: ${data.error || 'Error desconocido'}`, 'error');
            }
        } else {
            if (resp.status === 201) {
                mostrarMsg(`Paciente registrado correctamente — ${nombre1} ${apellido1}`, 'ok');
                setTimeout(resetearFormulario, 2200);
            } else if (resp.status === 409) {
                mostrarMsg(`El paciente con cédula ${cedula} ya tiene un registro en curso hoy (sin admisionar aún)`, 'warn');
            } else {
                mostrarMsg(`Error: ${data.error || 'Error desconocido'}`, 'error');
            }
        }
    } catch {
        mostrarMsg('Error de conexión con el servidor', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = editandoId ? 'Guardar cambios' : 'Registrar paciente';
    }
}

// Carga un paciente existente en el formulario para editarlo (modo UPDATE).
async function editarPaciente(id) {
    try {
        const resp = await fetch(`/api/recepcion/${id}`);
        if (!resp.ok) { mostrarMsg('No se pudo cargar el paciente para editar', 'error'); return; }
        const p = await resp.json();
        setVal('f-cedula', p.numero_identificacion || '');
        document.getElementById('f-tipo').value = p.tipo_identificacion || 'CC';
        setVal('f-fecha', p.fecha_nacimiento || '');
        setVal('f-apellido1', p.primer_apellido || '');
        setVal('f-apellido2', p.segundo_apellido || '');
        setVal('f-nombre1', p.primer_nombre || '');
        setVal('f-nombre2', p.segundo_nombre || '');
        document.getElementById('f-sexo').value = ['M', 'F'].includes(p.sexo) ? p.sexo : '';
        setVal('f-nota', p.nota || '');
        actualizarContadorNota();

        editandoId = id;
        // En edición la prioridad no se toca (el PUT no la actualiza; se cambia desde la cola).
        document.getElementById('grupo-prioridad').style.display = 'none';
        document.getElementById('preview-titulo').textContent = 'Editando paciente';
        document.getElementById('badge-formato').textContent = 'EDICIÓN';
        document.getElementById('btn-registrar').textContent = 'Guardar cambios';
        limpiarMensaje();
        document.getElementById('f-cedula').focus();
    } catch {
        mostrarMsg('Error de conexión con el servidor', 'error');
    }
}

// Contador de caracteres de la nota (la columna tope en 300).
function actualizarContadorNota() {
    const ta = document.getElementById('f-nota');
    const c = document.getElementById('nota-contador');
    if (ta && c) c.textContent = `${ta.value.length}/300`;
}

// El botón "Cancelar" ya no cierra el formulario: vacía todos sus campos.
function resetearFormulario() {
    ['f-cedula', 'f-fecha', 'f-apellido1', 'f-apellido2', 'f-nombre1', 'f-nombre2', 'f-nota']
        .forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('f-tipo').value = 'CC';
    document.getElementById('f-sexo').value = '';
    actualizarContadorNota();
    document.getElementById('badge-formato').textContent = 'MANUAL';
    // Restaurar la prioridad a 'normal' y volver a mostrar su selector (oculto en edición).
    document.getElementById('grupo-prioridad').style.display = '';
    seleccionarPrioridadForm('normal');
    // Salir del modo edición y restaurar el formulario a "registro".
    editandoId = null;
    document.getElementById('preview-titulo').textContent = 'Datos del paciente';
    document.getElementById('btn-registrar').textContent = 'Registrar paciente';
    limpiarMensaje();
    // Devolver el foco al lector para el siguiente escaneo (forzado: el botón
    // "Cancelar"/"Registrar" queda dentro del formulario tras el clic).
    setTimeout(() => scanInput.focus(), 50);
}

// Botón "Salir": limpia el formulario y vuelve al menú principal.
function salir() {
    resetearFormulario();
    window.location.href = '/';
}

function mostrarMsg(txt, tipo) {
    const el = document.getElementById('msg-resultado');
    el.className = `msg-resultado ${tipo}`;
    el.textContent = txt;
}
function limpiarMensaje() {
    const el = document.getElementById('msg-resultado');
    el.className = 'msg-resultado';
    el.textContent = '';
}

// ── Cola del día ────────────────────────────────────────────────
async function cargarCola() {
    try {
        const resp = await fetch('/api/recepcion/cola');
        const lista = await resp.json();
        renderCola(lista);
    } catch {}
}

// Cambia el texto del filtro y re-renderiza (sobre el cache; el contador no cambia).
function filtrarCola(texto) {
    filtroCola = texto || '';
    renderCola(colaCache);
}

// Expande/colapsa la sección de admisionados; el estado sobrevive a los re-renders.
function toggleAdmisionados() {
    admisionadosAbierto = !admisionadosAbierto;
    renderCola(colaCache);
}

// Construye una fila de la cola. `atenuado` aplica el estilo tenue (admisionados).
function renderItem(p, atenuado) {
    const estadoLabel = {
        esperando: 'Esperando',
        llamando_admision: 'Llamado',
        admisionado: 'Admisionado'
    }[p.estado_admision] || p.estado_admision;

    const hora = p.hora_llegada ? new Date(p.hora_llegada).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }) : '';

    // Editar y Eliminar solo mientras el paciente sigue 'esperando' (el backend rechaza
    // ambas acciones una vez llamado/admisionado). El id va en el onclick (UUID seguro);
    // el nombre se resuelve del cache en la función, nunca se interpola aquí.
    let acciones = '';
    if (p.estado_admision === 'esperando') {
        acciones = `<button class="btn-edit-pac" onclick="event.stopPropagation(); editarPaciente('${p.id}')">Editar</button>
            <button class="btn-del-pac" onclick="event.stopPropagation(); eliminarPaciente('${p.id}')">Eliminar</button>`;
    }

    return `<div class="cola-item${atenuado ? ' atenuado' : ''}" onclick="abrirModalPrioridad('${p.id}')">
        <span class="badge-pri pri-${esc(p.prioridad)}">${esc(String(p.prioridad || '').toUpperCase())}</span>
        <span class="cola-nombre">${esc(p.nombre_completo)}</span>
        <span class="cola-estado estado-${esc(p.estado_admision)}">${esc(estadoLabel)} ${hora}</span>
        ${acciones}
    </div>`;
}

function renderCola(lista) {
    const contenedor = document.getElementById('cola-lista');
    colaCache = Array.isArray(lista) ? lista : [];
    // El contador siempre refleja el TOTAL del día (no el filtrado).
    document.getElementById('cola-count').textContent = colaCache.length;

    if (!colaCache.length) {
        contenedor.innerHTML = '<div class="cola-vacia">Sin pacientes registrados hoy</div>';
        return;
    }

    // Filtro client-side por nombre o cédula (case-insensitive).
    const q = filtroCola.trim().toLowerCase();
    const coincide = p => !q ||
        (p.nombre_completo || '').toLowerCase().includes(q) ||
        String(p.numero_identificacion || '').toLowerCase().includes(q);
    const visibles = colaCache.filter(coincide);

    if (!visibles.length) {
        contenedor.innerHTML = '<div class="cola-vacia">Sin coincidencias</div>';
        return;
    }

    // Pendientes arriba (orden tal como llega del backend); admisionados/otros al final.
    const pendientes = visibles.filter(p => p.estado_admision === 'esperando' || p.estado_admision === 'llamando_admision');
    const admisionados = visibles.filter(p => p.estado_admision !== 'esperando' && p.estado_admision !== 'llamando_admision');

    let html = pendientes.map(p => renderItem(p, false)).join('');
    if (admisionados.length) {
        html += `<div class="cola-grupo-header" onclick="toggleAdmisionados()">${admisionadosAbierto ? '▾' : '▸'} Admisionados (${admisionados.length})</div>`;
        if (admisionadosAbierto) html += admisionados.map(p => renderItem(p, true)).join('');
    }
    contenedor.innerHTML = html;
}

// Elimina un registro de la cola (solo 'esperando'). Confirma con el nombre resuelto
// del cache por id (nunca interpolado en el onclick).
async function eliminarPaciente(id) {
    const p = colaCache.find(x => String(x.id) === String(id));
    if (!p) return;
    const ok = confirm(`¿Eliminar el registro de ${p.nombre_completo} (CC ${p.numero_identificacion})? Esta acción no se puede deshacer.`);
    if (!ok) return;
    try {
        const resp = await fetch(`/api/recepcion/${id}`, {
            method: 'DELETE',
            headers: { 'X-Terminal-Id': TERMINAL_ID }
        });
        if (resp.status === 409) alert('No se puede eliminar: el paciente ya fue llamado o admisionado.');
    } catch {
        alert('Error de conexión con el servidor');
    }
    cargarCola();
}

// ── Modal prioridad ─────────────────────────────────────────────
function abrirModalPrioridad(id) {
    // El nombre y la prioridad se resuelven del cache por id (no se arrastran en el
    // onclick), así el nombre puede contener apóstrofes o HTML sin romper nada.
    const p = colaCache.find(x => String(x.id) === String(id));
    if (!p) return;
    pacienteModalId = id;
    document.getElementById('modal-nombre-pac').textContent = p.nombre_completo || '';
    document.querySelectorAll('.modal .prioridad-btn').forEach(b => {
        b.classList.toggle('activo', b.dataset.val === p.prioridad);
    });
    document.getElementById('modal-prioridad').classList.add('visible');
}

async function cambiarPrioridad(nuevaPrioridad) {
    if (!pacienteModalId) return;
    try {
        const resp = await fetch(`/api/recepcion/${pacienteModalId}/prioridad`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'X-Terminal-Id': TERMINAL_ID },
            body: JSON.stringify({ prioridad: nuevaPrioridad })
        });
        if (resp.ok) { cerrarModal(); cargarCola(); }
    } catch {}
}

function cerrarModal() {
    document.getElementById('modal-prioridad').classList.remove('visible');
    pacienteModalId = null;
}

// Cerrar modal al hacer clic fuera
document.getElementById('modal-prioridad').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
});

// ── Init ────────────────────────────────────────────────────────
cargarCola();
</script>
