<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; width: 320px; margin: 0; background: #f1f5f9; color: #1e293b; }
        .header { background: #1a3a6e; color: white; padding: 12px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .btn-reload { background: transparent; border: 1px solid rgba(255,255,255,0.5); color: white; border-radius: 4px; padding: 4px 8px; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .btn-reload:hover { background: rgba(255,255,255,0.1); border-color: white; }
        .lista { max-height: 400px; overflow-y: auto; padding: 8px; }
        .paciente-card { background: white; border: 1px solid #e2e8f0; padding: 10px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .paciente-card:hover { border-color: #2563eb; background: #f8fafc; }
        .nombre { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .cedula { font-size: 11px; color: #64748b; }
        .hora { font-size: 11px; color: #16a34a; float: right; }
        .loader { text-align: center; padding: 20px; font-size: 12px; color: #64748b; }
        .error-msg { color: #dc2626; font-size: 11px; margin-top: 8px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="header">
        <span>Pacientes</span>
        <span>
            <button id="btn-actualizar" class="btn-reload">Actualizar</button>
            <button id="cfg-toggle" class="btn-reload" title="Servidor / secret" style="margin-left:4px;padding:4px 6px;">⚙</button>
        </span>
    </div>

    <div id="cfg-panel" style="display:none;background:#e2e8f0;padding:10px 12px;border-bottom:1px solid #cbd5e1;">
        <div style="font-weight:600;font-size:11px;color:#475569;margin-bottom:6px;">Conexión — vacío = usa config.js</div>
        <input id="cfg-url" type="text" placeholder="http://IP:3000" autocomplete="off"
               style="width:100%;padding:6px;margin-bottom:6px;border:1px solid #cbd5e1;border-radius:4px;font-size:12px;box-sizing:border-box;">
        <input id="cfg-secret" type="text" placeholder="(config.js)" autocomplete="off"
               style="width:100%;padding:6px;margin-bottom:6px;border:1px solid #cbd5e1;border-radius:4px;font-size:12px;box-sizing:border-box;">
        <div style="display:flex;gap:6px;">
            <button id="cfg-save" style="flex:1;padding:6px;border:none;border-radius:4px;background:#2563eb;color:#fff;font-size:12px;font-weight:600;cursor:pointer;">Guardar</button>
            <button id="cfg-reset" style="flex:1;padding:6px;border:none;border-radius:4px;background:#94a3b8;color:#fff;font-size:12px;font-weight:600;cursor:pointer;">Restablecer</button>
        </div>
        <div id="cfg-hint" style="font-size:10px;color:#64748b;margin-top:6px;"></div>
        <div id="cfg-status" style="font-size:10px;color:#16a34a;min-height:12px;"></div>
    </div>

    <div id="lista" class="lista">
        <div class="loader">Consultando Turnero...</div>
    </div>
    <script src="config.js"></script>
    <script src="config-override.js"></script>
    <script src="popup.js"></script>
</body>
</html>
