<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #f5f5f5;
      color: #222;
    }
    header {
      background: #1565c0;
      color: #fff;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header span { font-weight: 600; font-size: 14px; }
    .badge {
      margin-left: auto;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.ok   { background: #43a047; }
    .badge.err  { background: #e53935; }
    .badge.idle { background: #888; }

    section { padding: 10px 12px; border-bottom: 1px solid #ddd; }
    section:last-child { border-bottom: none; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 6px;
      text-align: center;
    }
    .stat-box {
      background: #fff;
      border-radius: 6px;
      padding: 6px 4px;
      border: 1px solid #e0e0e0;
    }
    .stat-box .num { font-size: 20px; font-weight: 700; }
    .stat-box .lbl { font-size: 10px; color: #666; margin-top: 2px; }
    .num.new { color: #1565c0; }
    .num.upd { color: #43a047; }
    .num.baja { color: #fb8c00; }
    .num.err { color: #e53935; }

    .snapshot {
      margin-top: 8px;
      text-align: center;
      font-size: 11px;
    }
    .snapshot .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .snapshot .tag.full { background: #e3f2fd; color: #1565c0; }
    .snapshot .tag.safe { background: #fff3e0; color: #e65100; }

    .last-sync { font-size: 11px; color: #666; margin-top: 8px; text-align: center; }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 7px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      background: #1565c0;
      color: #fff;
    }
    button:hover { background: #0d47a1; }

    .msg {
      font-size: 11px;
      margin-top: 6px;
      min-height: 14px;
      text-align: center;
      color: #43a047;
    }
    .msg.err { color: #e53935; }
  </style>
</head>
<body>
  <header>
    <span>Turnero — Biofile Sync</span>
    <span class="badge idle" id="badge">...</span>
  </header>

  <section>
    <div class="stats">
      <div class="stat-box"><div class="num new" id="s-new">—</div><div class="lbl">Nuevos</div></div>
      <div class="stat-box"><div class="num upd" id="s-upd">—</div><div class="lbl">Actualiz.</div></div>
      <div class="stat-box"><div class="num baja" id="s-baja">—</div><div class="lbl">De baja</div></div>
      <div class="stat-box"><div class="num err" id="s-err">—</div><div class="lbl">Errores</div></div>
    </div>
    <div class="snapshot" id="snapshot"></div>
    <div class="last-sync" id="last-sync">Sin sincronizaciones aún</div>
    <button id="btn-sync">Sincronizar ahora</button>
    <div class="msg" id="msg"></div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
